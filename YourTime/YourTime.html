<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng hồ - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/YourTime.css">
</head>
<body>
    <input class="tab-radio" type="radio" name="time-tabs" id="tab-clock" checked>
    <input class="tab-radio" type="radio" name="time-tabs" id="tab-timer">
    <input class="tab-radio" type="radio" name="time-tabs" id="tab-stopwatch">
    <div class="window-container">
        <aside class="sidebar">
            <a class="brand" href="../MainPage/MainPage.html">YOURTIME</a>
            <a class="menu-item" href="../MainPage/MainPage.html">
                <span class="menu-icon" aria-hidden="true">🏠</span>
                <span class="menu-label">Trang chủ</span>
            </a>
            <label class="menu-item" for="tab-clock">
                <span class="menu-icon" aria-hidden="true">CLK</span>
                <span class="menu-label">Giờ hiện tại</span>
            </label>
            <label class="menu-item" for="tab-timer">
                <span class="menu-icon" aria-hidden="true">TMR</span>
                <span class="menu-label">Hẹn giờ</span>
            </label>
            <label class="menu-item" for="tab-stopwatch">
                <span class="menu-icon" aria-hidden="true">SW</span>
                <span class="menu-label">Bấm giờ</span>
            </label>
        </aside>

        <main class="main-content">
            
            <section id="world-clock-tab" class="tab-content">
                <header class="content-header">
                    <h2>Giờ hiện tại</h2>
                </header>
                <div class="clock-display">
                    <div class="digital-clock" id="digitalClock">00:00:00</div>
                    <div class="date-display" id="dateDisplay">Thứ, Ngày Tháng Năm</div>

                    <div class="timezone-list">
                        <div class="timezone-item">
                            <span class="timezone-icon" aria-hidden="true">NY</span>
                            <div class="tz-info">
                                <span class="tz-name">New York, Mỹ</span>
                                <span class="tz-diff" id="newYorkDiff">Giờ địa phương</span>
                            </div>
                            <div class="tz-time" id="newYorkTime">00:00</div>
                        </div>
                        <div class="timezone-item">
                            <span class="timezone-icon" aria-hidden="true">LDN</span>
                            <div class="tz-info">
                                <span class="tz-name">London, Anh</span>
                                <span class="tz-diff" id="londonDiff">Giờ địa phương</span>
                            </div>
                            <div class="tz-time" id="londonTime">00:00</div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="timer-tab" class="tab-content">
                <header class="content-header">
                    <h2>Hẹn giờ</h2>
                </header>
                <div class="tab-placeholder">
                    <div class="timer-circle" id="timerDisplay">05:00</div>
                    <div class="control-buttons">
                        <button class="win-btn primary" id="startTimerBtn">Bắt đầu</button>
                        <button class="win-btn" id="resetTimerBtn">Đặt lại</button>
                    </div>
                </div>
            </section>

            <section id="stopwatch-tab" class="tab-content">
                <header class="content-header">
                    <h2>Bấm giờ</h2>
                </header>
                <div class="tab-placeholder">
                    <div class="stopwatch-display" id="stopwatchDisplay">00:00.00</div>
                    <div class="control-buttons">
                        <button class="win-btn primary" id="startStopwatchBtn">Bắt đầu</button>
                        <button class="win-btn" id="resetStopwatchBtn">Đặt lại</button>
                    </div>
                </div>
            </section>

            <footer class="app-footer">
                <span>YOURTIME</span>
                <span>Được phát triển bởi Công Nghĩa & Khôi Nguyên.</span>
            </footer>

        </main>
    </div>

    <script src="YourTime.js"></script>
</body>
</html>
