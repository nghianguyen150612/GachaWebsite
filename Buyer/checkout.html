<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer - Checkout</title>
    <link rel="stylesheet" href="../CSS/Buyer.css">
</head>
<body>
    <div class="shop-window">
        <aside class="sidebar">
            <a class="brand" href="../MainPage/">Buyer</a>
            <nav aria-label="Shop navigation">
                <a href="index.html">Products</a>
                <a href="cart.html">Cart</a>
                <a class="active" href="checkout.html">Checkout</a>
            </nav>
        </aside>

        <main class="shop-content">
            <section class="panel checkout-panel" aria-labelledby="CheckoutTitle">
                <div class="section-header">
                    <div>
                        <p class="eyebrow">Checkout</p>
                        <h1 id="CheckoutTitle">Order Summary</h1>
                    </div>
                    <a href="cart.html">Back to Cart</a>
                </div>

                <div id="checkout-list" class="cart-list"></div>
                <div class="cart-line total">
                    <span>Total</span>
                    <strong id="checkout-total">$0</strong>
                </div>

                <button type="button">Place Order</button>
                <p class="note">Demo only. This button has no action.</p>
            </section>
        </main>
    </div>

    <script src="buyer.js"></script>
</body>
</html>
