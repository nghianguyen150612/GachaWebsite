<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer - Cart</title>
    <link rel="stylesheet" href="../CSS/Buyer.css">
</head>
<body>
    <div class="shop-window">
        <aside class="sidebar">
            <a class="brand" href="../MainPage/">Buyer</a>
            <nav aria-label="Shop navigation">
                <a href="index.html">Products</a>
                <a class="active" href="cart.html">Cart</a>
                <a href="checkout.html">Checkout</a>
            </nav>
        </aside>

        <main class="shop-content">
            <section class="panel" aria-labelledby="CartTitle">
                <div class="section-header">
                    <div>
                        <p class="eyebrow">Cart</p>
                        <h1 id="CartTitle">Your Cart</h1>
                    </div>
                    <a href="index.html">Continue Shopping</a>
                </div>

                <div id="cart-list" class="cart-list"></div>

                <div class="page-actions">
                    <a class="action-link" href="checkout.html">Go to Checkout</a>
                    <button type="button" data-clear-cart>Clear Cart</button>
                </div>
            </section>
        </main>
    </div>

    <script src="buyer.js"></script>
</body>
</html>
