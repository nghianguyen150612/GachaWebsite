<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - GachaWebsite</title>
    <link rel="stylesheet" href="CSS/index.css">
</head>
<body>
    <main class="main-page">
        <section class="main-header">
            <h1>GachaWebsite</h1>
            <p id="WelcomeMessage"></p>
            <button id="LogoutButton" type="button">Log Out</button>
        </section>

        <section class="wheel-wrapper" aria-label="Vòng quay may mắn">
            <div class="arrow"></div>

            <div class="wheel" id="wheel">
                <div class="slice slice-1"><span>Buyer</span></div>
                <div class="slice slice-2"><span>iTube</span></div>
                <div class="slice slice-3"><span>MusicListener</span></div>
                <div class="slice slice-4"><span>Stream</span></div>
                <div class="slice slice-5"><span>YourTime</span></div>
            </div>

            <button class="center-circle" id="spin-btn" type="button">QUAY</button>
        </section>

    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" id="close-modal" type="button" aria-label="Close">&times;</button>
            <h2>CHÚC MỪNG!</h2>
            <p>Bạn đã quay vào <span class="prize-text" id="prize-display">Ô 1</span>!</p>
            <p class="sub-text">Phần thưởng của bạn: [Tên phần thưởng]!<br>Vui lòng làm theo hướng dẫn.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
