<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giai Điệu Của Tôi - Music Player</title>
    <link rel="stylesheet" href="music.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-music"></i> <span>MyMusic</span>
            </div>
            <nav class="menu">
                <div class="menu-item active" data-target="home-tab">
                    <i class="fa-solid fa-house"></i> <span>Trang chủ</span>
                </div>
                <div class="menu-item" data-target="favorites-tab">
                    <i class="fa-solid fa-heart"></i> <span>Bài hát yêu thích</span>
                </div>
                <div class="menu-item" data-target="albums-tab">
                    <i class="fa-solid fa-compact-disc"></i> <span>Album của tôi</span>
                </div>
            </nav>
            <hr class="separator">
            <div class="album-section">
                <button id="createNewAlbumBtn" class="add-album-btn">
                    <i class="fa-solid fa-plus"></i> Tạo Album mới
                </button>
                <div id="sidebarAlbumList" class="sidebar-album-list">
                    </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Tìm kiếm bài hát...">
                </div>
                <label for="audioUpload" class="upload-btn">
                    <i class="fa-solid fa-file-audio"></i> Chọn nhạc từ máy
                </label>
                <input type="file" id="audioUpload" accept="audio/*" multiple style="display: none;">
            </header>

            <section id="home-tab" class="tab-content active">
                <h2 class="tab-title">Tất cả bài hát</h2>
                <div class="song-list" id="allSongsList">
                    <p class="empty-msg">Chưa có bài hát nào. Hãy bấm "Chọn nhạc từ máy" để thêm nhạc!</p>
                </div>
            </section>

            <section id="favorites-tab" class="tab-content">
                <h2 class="tab-title">Bài hát yêu thích</h2>
                <div class="song-list" id="favoriteSongsList">
                    <p class="empty-msg">Chưa có bài hát yêu thích nào. Hãy bấm tim 🤍 ở bài hát bạn thích!</p>
                </div>
            </section>

            <section id="albums-tab" class="tab-content">
                <h2 class="tab-title" id="currentAlbumTitle">Danh sách Album</h2>
                <div class="album-grid" id="albumGrid">
                    </div>
                <div class="song-list" id="albumSongsList" style="display: none; margin-top: 20px;">
                    <button id="backToAlbumsBtn" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lại Album</button>
                    <div id="albumSongsContainer"></div>
                </div>
            </section>
        </main>
    </div>

    <footer class="music-player">
        <div class="now-playing">
            <div class="track-info">
                <div class="track-name" id="playerTitle">Chưa có bài hát</div>
                <div class="track-artist" id="playerArtist">Local File</div>
            </div>
            <button id="playerHeartBtn" class="player-heart"><i class="fa-regular fa-heart"></i></button>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playBtn" class="main-play-btn"><i class="fa-solid fa-play"></i></button>
                <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100">
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <div class="player-volume">
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volumeBar" value="100" min="0" max="100">
        </div>
    </footer>

    <audio id="mainAudio"></audio>

    <script src="script.js"></script>
</body>
</html>
