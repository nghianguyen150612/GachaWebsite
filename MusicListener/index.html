<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicListener</title>
    <link rel="stylesheet" href="../CSS/MusicListener.css">
</head>
<body>
    <main class="music-app">
        <header class="app-header">
            <div>
                <h1>MusicListener</h1>
                <p>Listen to the local tracks included with this website.</p>
            </div>
            <a href="../MainPage/">Back</a>
        </header>

        <section class="player-panel">
            <div class="now-playing">
                <span class="eyebrow">Now Playing</span>
                <h2 id="trackTitle">Music 1</h2>
            </div>

            <audio id="audioPlayer" src="Music1.mp3"></audio>

            <div class="controls" aria-label="Music controls">
                <button id="prevBtn" type="button" aria-label="Previous track">Prev</button>
                <button id="playBtn" class="primary" type="button">Play</button>
                <button id="nextBtn" type="button" aria-label="Next track">Next</button>
            </div>

            <div class="progress-row">
                <span id="currentTime">0:00</span>
                <input id="progressBar" type="range" min="0" max="100" value="0" aria-label="Track progress">
                <span id="durationTime">0:00</span>
            </div>

            <label class="volume-row" for="volumeBar">
                <span>Volume</span>
                <input id="volumeBar" type="range" min="0" max="100" value="100">
            </label>
        </section>

        <section class="track-list" aria-label="Track list">
            <button class="track active" type="button" data-index="0">
                <span>01</span>
                Music 1
            </button>
            <button class="track" type="button" data-index="1">
                <span>02</span>
                Music 2
            </button>
            <button class="track" type="button" data-index="2">
                <span>03</span>
                Music 3
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
