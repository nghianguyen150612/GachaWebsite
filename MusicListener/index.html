<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicListener</title>
    <link rel="stylesheet" href="../CSS/MusicListener.css">
</head>
<body>
    <main class="music-app">
        <header class="app-header">
            <div>
                <h1>MusicListener</h1>
                <p>Listen to the local tracks included with this website.</p>
            </div>
            <a href="../MainPage/">Back</a>
        </header>

        <section class="track-list" aria-label="Track list">
            <article class="track-card">
                <div>
                    <span>01</span>
                    <h2>Music 1</h2>
                </div>
                <audio controls src="Music1.mp3"></audio>
            </article>

            <article class="track-card">
                <div>
                    <span>02</span>
                    <h2>Music 2</h2>
                </div>
                <audio controls src="Music2.mp3"></audio>
            </article>

            <article class="track-card">
                <div>
                    <span>03</span>
                    <h2>Music 3</h2>
                </div>
                <audio controls src="Music3.mp3"></audio>
            </article>
        </section>
    </main>
</body>
</html>
