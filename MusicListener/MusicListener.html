<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nghe nhạc - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/MusicListener.css">
</head>
<body>
    <main class="music-app">
        <header class="app-header">
            <div>
                <h1>MUSIC LISTENER</h1>
                <p>Web nghe nhạc với chất lượng âm thanh cao</p>
            </div>
            <nav class="top-nav" aria-label="Điều hướng nhạc">
                <a href="../MainPage/MainPage.html">🏠 Trang chủ</a>
            </nav>
        </header>

        <section class="track-list" aria-label="Danh sách bài nhạc">
            <article class="track-card">
                <div>
                    <span>BÀI 1</span>
                    <h2>Fly Away</h2>
                </div>
                <audio controls src="Music1.mp3"></audio>
            </article>

            <article class="track-card">
                <div>
                    <span>BÀI 2</span>
                    <h2>Nơi này có anh</h2>
                </div>
                <audio controls src="Music2.mp3"></audio>
            </article>

            <article class="track-card">
                <div>
                    <span>BÀI 3</span>
                    <h2>Hai triệu năm</h2>
                </div>
                <audio controls src="Music3.mp3"></audio>
            </article>
        </section>

        <footer class="app-footer">
            <span>MUSIC LISTENER</span>
            <span>Được phát triển bởi Công Nghĩa & Khôi Nguyên.</span>
        </footer>
    </main>
</body>
</html>
