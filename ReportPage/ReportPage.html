<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo lỗi - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/ReportPage.css">
</head>
<body>
    <div class="shop-window">
        <aside class="sidebar">
            <a class="brand" href="../MainPage/MainPage.html">REPORTPAGE</a>
            <nav aria-label="Điều hướng báo lỗi">
                <a class="menu-item" href="../MainPage/MainPage.html">
                    <span class="menu-icon" aria-hidden="true">🏠</span>
                    <span class="menu-label">Trang chủ</span>
                </a>
                <label class="menu-item">
                    <span class="menu-icon" aria-hidden="true">📋</span>
                    <span class="menu-label">Gửi báo cáo</span>
                </label>
            </nav>
        </aside>

        <main class="shop-content">
            <section class="hero">
                <p class="eyebrow">ReportPage</p>
                <h1>Báo cáo lỗi</h1>
                <p>Hãy cải thiện trang web bằng cách báo cáo các vấn đề gặp phải</p>
            </section>

            <form class="report-form" id="reportForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Họ và tên</label>
                        <input type="text" id="name" name="name" placeholder=" " required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder=" " required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="type">Loại báo cáo</label>
                        <select id="type" name="type" required>
                            <option value=""> </option>
                            <option value="bug">Lỗi trang web</option>
                            <option value="crash">Web bị sập</option>
                            <option value="performance">Web chậm, lag</option>
                            <option value="ui">Lỗi giao diện</option>
                            <option value="feature">Đề xuất thêm tính năng</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="severity">Mức độ ảnh hưởng</label>
                        <select id="severity" name="severity" required>
                            <option value=""> </option>
                            <option value="low">Thấp  -Gây bất tiện nhỏ</option>
                            <option value="medium">Trung bình -Ảnh hưởng đến web, chức năng</option>
                            <option value="high">Cao - Tính năng,web không dùng được</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Trang bị ảnh hưởng</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="page1" name="page" value="MainPage">
                            <label for="page1">Trang chủ</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="page2" name="page" value="Stream">
                            <label for="page2">Stream</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="page3" name="page" value="Buyer">
                            <label for="page3">Buyer</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="page4" name="page" value="iTube">
                            <label for="page4">iTube</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="page5" name="page" value="YourTime">
                            <label for="page5">YourTime</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="page6" name="page" value="MusicListener">
                            <label for="page6">MusicListener</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả lỗi</label>
                    <textarea
                        id="description"
                        name="description"
                        placeholder=" "
                        required
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit">Gửi báo cáo</button>
                    <button type="button" class="secondary" id="clearBtn">Xóa biểu mẫu</button>
                </div>

                <div class="success-message" id="successMessage">
                    Cảm ơn bạn đã gửi báo cáo, chúng tôi sẽ khắc phục và phản hồi bạn sớm.
                </div>
            </form>

            <footer class="app-footer">
                <span>REPORT PAGE</span>
                <span>Được phát triển bởi Công Nghĩa & Khôi Nguyên.</span>
            </footer>
        </main>
    </div>

    <script src="Reportpage.js"></script>
</body>
</html>
