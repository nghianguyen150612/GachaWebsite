<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Bug - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/ReportPage.css">
</head>
<body>
    <main class="report-page">
        <header class="report-header">
            <div>
                <h1>Report a Bug</h1>
                <p>Write the problem you found.</p>
            </div>
            <a href="../MainPage/">Back to Main Page</a>
        </header>

        <section class="report-box">
            <label for="BugText">Bug report</label>
            <textarea id="BugText" rows="12" placeholder="Type your bug report here..."></textarea>
        </section>
    </main>
</body>
</html>
