<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/MainPage.css">
</head>
<body>
    <main class="main-page">
        <section class="main-header">
            <h1>GachaWebsite</h1>
            <p id="WelcomeMessage"></p>
            <div class="header-actions">
                <a class="report-link" href="../ReportPage/">Report Bug</a>
                <button id="LogoutButton" type="button">Log Out</button>
            </div>
        </section>

        <section class="wheel-wrapper" aria-label="Lucky wheel">
            <div class="arrow"></div>

            <div class="wheel" id="wheel">
                <div class="slice slice-1" data-name="Buyer" data-url="Buyer/"><span>Buyer</span></div>
                <div class="slice slice-2" data-name="iTube" data-url="iTube/"><span>iTube</span></div>
                <div class="slice slice-3" data-name="MusicListener" data-url="MusicListener/"><span>MusicListener</span></div>
                <div class="slice slice-4" data-name="Stream" data-url="Stream/"><span>Stream</span></div>
                <div class="slice slice-5" data-name="YourTime" data-url="YourTime/"><span>YourTime</span></div>
            </div>

            <button class="center-circle" id="spin-btn" type="button">Spin</button>
        </section>

    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <h2>CONGRATUATIONS</h2>
            <p class="prize-text" id="result-message">You have spun "Website".</p>
            <p class="sub-text">Redirecting to the selected website...</p>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
