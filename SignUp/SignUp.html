<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - GachaWebsite</title>
    <link rel="stylesheet" href="../CSS/SignUp.css">
</head>
<body>

    <form id="SignUpForm">
        <h2>Đăng ký</h2>

        <div>
            <label for="Name">Họ và tên </label>
            <input type="text" id="Name" name="Name" placeholder=" " required>
        </div>

        <div>
            <label for="Username">Tên đăng nhập</label>
            <input type="text" id="Username" name="Username" placeholder=" " required>
        </div>

        <div>
            <label for="Email">Email</label>
            <input type="email" id="Email" name="Email" placeholder=" " required>
        </div>

        <div>
            <label for="ConfirmEmail">Nhập lại email</label>
            <input type="email" id="ConfirmEmail" name="ConfirmEmail" placeholder=" " required>
        </div>

        <div>
            <label for="Password">Mật khẩu</label>
            <input type="password" id="Password" name="Password" placeholder=" " required>
        </div>

        <div>
            <label for="ConfirmPassword">Nhập lại mật khẩu</label>
            <input type="password" id="ConfirmPassword" name="ConfirmPassword" placeholder=" " required>
        </div>

        <button type="submit">Đăng ký</button>
        <a class="form-link" href="../Login/LogIn.html">Bạn đã có tài khoản? Đăng nhập tại đây</a>
    </form>

    <p id="FormError" aria-live="polite"></p>

    <script src="../script.js"></script>
</body>
</html>
